<body>
    <h2><a href="https://github.com/taisukef/marked_md" target="_blank">marked_md</a></h2>
    <div class="text-center">
        <h2>GitHubDocumentViewer</h2>
    </div>
</body>
<p class="text">
        <!-- README取得する -->
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <!-- <title>GitHub README Viewer with Marked</title> -->
                <!-- 外部CSSファイルの読み込み -->
                <link rel="stylesheet" href="../../CSS/style.css">
                <!-- markedライブラリ -->
                <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            </head>
            <body>
    <div class="bordered">
            <div id="readme-content" class="markdown-body"></div>
            <script>
                async function fetchAndDisplayReadme() {
                    const url = 'https://raw.githubusercontent.com/taisukef/marked_md/refs/heads/master/LICENSE.md';
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            const markdown = await response.text();
                            const htmlContent = marked.parse(markdown);
                            document.getElementById('readme-content').innerHTML = htmlContent;
                        } else {
                            console.error('Failed to fetch README:', response.status);
                            document.getElementById('readme-content').innerText = "READMEの取得に失敗しました。";
                        }
                    } catch (error) {
                        console.error('Error fetching README:', error);
                        document.getElementById('readme-content').innerText = "エラーが発生しました。";
                    }
                }
                fetchAndDisplayReadme();
            </script>
        </body>
    </div>
</p>

<body>
    <h2><a href="https://github.com/sindresorhus/github-markdown-css" target="_blank">github-markdown-css</a></h2>
    <div class="text-center">
        <h2>GitHubDocumentViewer</h2>
    </div>
    <div class="bordered">
        <div id="content">Loading...</div>
        <script>
            // GitHub rawデータのURLを指定
            const url = 'https://raw.githubusercontent.com/sindresorhus/github-markdown-css/refs/heads/main/license';
        
            // データをfetchで取得
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.text();
                })
                .then(data => {
                    // 取得したデータをcontentのdivに挿入
                    document.getElementById('content').textContent = data;
                })
                .catch(error => {
                    console.error('Error fetching the file:', error);
                    document.getElementById('content').textContent = "Failed to load content.";
                });
        </script>
</body>
